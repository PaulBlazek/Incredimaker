<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incredimaker Stage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <main class="app">
      <section class="toolbar">
        <label class="control">
          <span>Incredibox</span>
          <select id="boxSelect"></select>
        </label>
        <label class="control">
          <span>Slots</span>
          <input id="slotCount" type="number" min="4" max="16" step="1" value="9">
        </label>
        <label class="control check-control">
          <span>Auto Mode</span>
          <input id="autoModeToggle" type="checkbox">
        </label>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="clearBtn" type="button">Clear stage</button>
        <button id="pauseBtn" type="button">Pause</button>
        <div id="transportStatus" class="transport-status">Transport idle</div>
        <div id="transportMeter" class="transport-meter hidden">
          <div class="meter-head">
            <span id="loopIndexText">Loop 1/2</span>
            <span id="loopProgressText">0%</span>
          </div>
          <div class="meter-track">
            <div id="loopProgressFill" class="meter-fill"></div>
          </div>
        </div>
      </section>

      <section class="stage-wrap">
        <div id="stage" class="stage"></div>
      </section>

      <section class="palette-wrap">
        <h2>Character Palette</h2>
        <div id="palette" class="palette"></div>
        <div class="customizer">
          <h3>Character Customization</h3>
          <label class="control">
            <span>Character</span>
            <select id="customCharSelect"></select>
          </label>
          <label class="control check-control">
            <span>Separate Stage Image</span>
            <input id="separateStageImageToggle" type="checkbox">
          </label>
          <label class="control">
            <span>Palette Image (Square)</span>
            <input id="paletteImageInput" type="file" accept="image/*">
          </label>
          <label id="stageImageControl" class="control hidden">
            <span>Stage Image (Portrait)</span>
            <input id="stageImageInput" type="file" accept="image/*">
          </label>
          <div class="customizer-actions">
            <button id="clearImagesBtn" type="button">Clear Images</button>
            <button id="hideCharBtn" type="button">Hide Character</button>
          </div>
          <div class="hidden-characters">
            <h4>Hidden Characters</h4>
            <div id="hiddenCharList"></div>
          </div>
          <div class="role-colors">
            <h4>Role Colors</h4>
            <div id="roleColorEditor"></div>
            <button id="resetRoleColorsBtn" type="button">Reset Role Colors</button>
          </div>
        </div>
      </section>
    </main>

    <template id="paletteItemTpl">
      <button class="palette-item" draggable="true" type="button">
        <img class="thumb hidden" alt="">
        <span class="name"></span>
        <span class="role"></span>
      </button>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
